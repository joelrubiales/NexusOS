# ── ISO automática en GitHub ─────────────────────────────────────────────
# No hace falta pulsar nada en GitHub: basta con subir cambios a esta rama.
#
#   git add .
#   git commit -m "..."
#   git push origin main
#
# → Actions compila con `make` y deja NexusOS.iso en Artifacts (~1–3 min).
# También: pestaña Actions → "Build ISO" → "Run workflow" (manual).

name: Build ISO

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-iso-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install toolchain (GCC, NASM, GRUB, xorriso, Python)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            nasm \
            grub-common \
            xorriso \
            grub-pc-bin \
            python3 \
            mtools

      - name: Diagnostics
        run: |
          gcc --version
          nasm --version
          python3 --version
          grub-mkrescue --version || true

      - name: make (kernel + ISO)
        run: |
          make -j"$(nproc)"
          test -f NexusOS.iso
          ls -la NexusOS.iso kernel.elf

      - name: Upload NexusOS.iso
        uses: actions/upload-artifact@v4
        with:
          name: NexusOS
          path: NexusOS.iso
          if-no-files-found: error
          retention-days: 90
