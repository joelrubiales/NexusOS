# NexusOS — GRUB2 Multiboot2 (dual-boot minimalista).
# Tema texto: fondo oscuro, entrada activa en azul (16:9 lo fija el firmware/VESA;
#   para tarjetas PNG redondeadas hace falta theme.txt + imágenes en /boot/grub/themes/).

set timeout=5
set default=0

# Paleta minimalista (texto claro / highlight azul)
set menu_color_normal=white/dark-gray
set menu_color_highlight=white/blue

menuentry "Instalar NexusOS (Instalador grafico)" {
	multiboot2 /boot/kernel.bin mode=gui
	module2    /boot/initrd.tar initrd
	boot
}

menuentry "NexusOS (Linea de comandos / Rescate)" {
	multiboot2 /boot/kernel.bin mode=cli
	module2    /boot/initrd.tar initrd
	boot
}
